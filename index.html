}

function playPedalClick() {
  const now=performance.now();
  if(now-lastPedalClick<150) return;
  lastPedalClick=now;
  sfx(()=>{
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=90+Math.random()*30;
    g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.01);
    o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.015);
  });

function initWindNoise() {
  if(windSource) return;
  sfx(()=>{
    const bufSize=audioCtx.sampleRate*2;
    const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1;
    windSource=audioCtx.createBufferSource();windSource.buffer=buf;windSource.loop=true;
    windFilter=audioCtx.createBiquadFilter();windFilter.type='bandpass';windFilter.frequency.value=300;windFilter.Q.value=0.5;
    windGain=audioCtx.createGain();windGain.gain.value=0;
    windSource.connect(windFilter);windFilter.connect(windGain);windGain.connect(masterGain);
    windSource.start();
  });
}

function updateWindNoise(speed) {
  if(!windGain||!windFilter) return;
  const s=Math.max(0,(speed-15)/55);
  windGain.gain.setTargetAtTime(s*0.08,audioCtx.currentTime,0.1);
  windFilter.frequency.setTargetAtTime(300+speed*15,audioCtx.currentTime,0.1);
}

function stopWindNoise() {
  if(windSource){try{windSource.stop();}catch(e){}}
  windSource=null;windGain=null;windFilter=null;
}

// Background music — gentle chord progression
const CHORDS=[[261.6,329.6,392],[349.2,440,523.3],[392,493.9,587.3],[261.6,329.6,392]];
let bgChordIdx=0;

function startBGMusic() {
  if(bgOscs.length||!audioCtx) return;
  sfx(()=>{
    // Bass
    const bo=audioCtx.createOscillator(),bg=audioCtx.createGain();
    bo.type='sine';bo.frequency.value=CHORDS[0][0]/2;
    bg.gain.value=0.04;bo.connect(bg);bg.connect(masterGain);bo.start();
    bgOscs.push(bo);bgGains.push(bg);
    // Pad (3 oscillators)
    for(let i=0;i<3;i++){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=CHORDS[0][i];
      g.gain.value=0.025;o.connect(g);g.connect(masterGain);o.start();
      bgOscs.push(o);bgGains.push(g);
    }
    bgChordIdx=0;
    bgInterval=setInterval(()=>{
      bgChordIdx=(bgChordIdx+1)%CHORDS.length;
      const c=CHORDS[bgChordIdx],t=audioCtx.currentTime;
      bgOscs[0].frequency.setTargetAtTime(c[0]/2,t,0.5);
      for(let i=0;i<3;i++) bgOscs[i+1].frequency.setTargetAtTime(c[i],t,0.5);
    },4000);
  });
}

function stopBGMusic() {
  if(bgInterval){clearInterval(bgInterval);bgInterval=null;}
  bgOscs.forEach(o=>{try{o.stop();}catch(e){}});
  bgOscs=[];bgGains=[];
  stopWindNoise();
}

// ============================================================
// COUNTDOWN
// ============================================================
function updateCountdown(dt) {
  if(!countdownActive) return false;
  countdownTimer+=dt;
  const newVal=Math.max(0,3-Math.floor(countdownTimer));
  const el=document.getElementById('countdown-text');
  // Detect tick change
  const prevVal=Math.max(0,3-Math.floor(countdownTimer-dt));
  if(newVal!==prevVal||countdownTimer<dt+0.01){
    if(newVal>0){
      el.textContent=newVal; el.style.color='#fff';
      el.style.transform='scale(1.4)';el.style.opacity='1';
      setTimeout(()=>{el.style.transform='scale(1)';},100);
      playCountdownBeep(false);
    } else if(newVal===0&&prevVal>0){
      el.textContent='GO!'; el.style.color='#2A9D8F';
      el.style.transform='scale(1.6)';el.style.opacity='1';
      setTimeout(()=>{el.style.transform='scale(1)';},100);
      playCountdownBeep(true);
    }
  }
  if(countdownTimer>=4){
    countdownActive=false;
    document.getElementById('countdown-overlay').style.display='none';
    el.style.opacity='0';
    player.speed=30;
    // Sync rotation from quaternion back to Euler for gameplay code
    if(player.group){
      player.group.rotation.setFromQuaternion(player.group.quaternion);
    }
    raceStartTime=performance.now();
    return false;
  }
  return true;
}

// ============================================================
// HUD
// ============================================================
function updateHUD() {
  // Rank
  let rank=1, crashed=0;
  for(const npc of npcs){if((npc.finished||npc.t>player.t)&&!npc.crashed) rank++; if(npc.crashed) crashed++;}

  const posEl=document.getElementById('hud-pos');
  posEl.textContent = playerCrashed?'CRASHED!':`#${rank} / 100`;

  // Position change notification
  if(!playerCrashed && rank!==lastRank && raceStartTime>0){
    const diff=lastRank-rank;
    const pcEl=document.getElementById('pos-change');
    if(diff>0){
      pcEl.className='up'; pcEl.textContent='\u25B2 +'+diff;
      playOvertakeChime();
    } else {
      pcEl.className='down'; pcEl.textContent='\u25BC '+diff;
    }
    rankChangeTimer=2;
    lastRank=rank;
  }
  if(rankChangeTimer>0){
    rankChangeTimer-=0.066;
    if(rankChangeTimer<=0) document.getElementById('pos-change').className='';
  }

  // Speed display with color tiers
  const spdKmh=Math.round(player.speed*1.8);
  const spdEl=document.getElementById('hud-spd');
  spdEl.textContent=spdKmh+' km/h';
  if(player.sprinting) spdEl.style.color='#FF4444';
  else if(spdKmh>=100) spdEl.style.color='#F4A261';
  else if(spdKmh>=80) spdEl.style.color='#FFD700';
  else spdEl.style.color='#fff';

  // Progress bar
  document.getElementById('hud-dist-fill').style.width=(player.t*100).toFixed(1)+'%';

  // Sprint bar
  const sf=player.sprintCooldown>0?1-player.sprintCooldown/5:1;
  const sfEl=document.getElementById('hud-sprint-fill');
  sfEl.style.width=(sf*100)+'%';
  sfEl.style.background=player.sprinting?'#E63946':'#F4A261';

  // Jump bar
  const jf=player.jumpCooldown>0?1-player.jumpCooldown/2:1;
  document.getElementById('hud-jump-fill').style.width=(jf*100)+'%';

  // Kick indicator
  const kickEl=document.getElementById('hud-kick');
  kickEl.style.opacity=kickState.cooldown>0?'0.3':'1';
  kickEl.style.color=kickState.active?'#E63946':'#fff';

  // Race timer (track internally for results)
  if(raceStartTime>0&&!raceFinished) raceElapsed=(performance.now()-raceStartTime)/1000;
  // Distance display instead of timer
  const distKm=(player.t*SPINE_N*SPINE_SP/1000).toFixed(1);
  const totalKm=(SPINE_N*SPINE_SP/1000).toFixed(1);
  document.getElementById('hud-timer').textContent=distKm+' / '+totalKm+' km';

  // Speed lines: sprint or high speed
  const slEl=document.getElementById('speed-lines');
  const spdNorm=Math.max(0,(player.speed-40)/30); // fade in above 40 units/s
  if(player.sprinting||spdNorm>0){
    slEl.style.display='block';
    slEl.style.opacity=String(player.sprinting?0.8:Math.min(0.5,spdNorm));
  } else { slEl.style.display='none'; }
}

// ============================================================
// SCREEN STATE MACHINE
// ============================================================
function setState(s) {
  try{
  gameState = s; paused = false;
  document.getElementById('scr-title').style.display='none';
  document.getElementById('scr-customize').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('scr-result').style.display='none';
  document.getElementById('result-buttons').style.opacity='0';
  document.getElementById('hud-pause').style.display='none';
  document.getElementById('pause-menu').style.display='none';
  document.getElementById('countdown-overlay').style.display='none';
  document.getElementById('speed-lines').style.display='none';
  if(isMobile){document.getElementById('m-ctrl').style.display='none';document.getElementById('m-steer-hint').style.display='none';}

  switch(s){
    case 'title':
      document.getElementById('scr-title').style.display='flex';
      renderer.setClearColor(0x1a1a2e);
      stopBGMusic();
      retryMode=false;
      break;
    case 'customize':
      document.getElementById('scr-customize').style.display='flex';
      renderer.setClearColor(0x1a1a2e);
      if(riderOnBike && !custScene.children.includes(riderOnBike)){
        raceScene.remove(riderOnBike);
        riderOnBike.position.set(0,0.3,0);
        riderOnBike.rotation.set(0,0,0);
        riderOnBike.visible=true;
        custScene.add(riderOnBike);
      }
      break;
    case 'race':
      initRace();
      document.getElementById('hud').style.display='block';
      if(isMobile){
        document.getElementById('m-ctrl').style.display='block';
        if(!mobileHintShown){
          mobileHintShown=true;
          const hint=document.getElementById('m-steer-hint');
          hint.style.display='flex';
          setTimeout(()=>{hint.style.display='none';},4000);
        }
      }
      hudCounter=0; updateHUD();
      break;
    case 'gameover': {
      stats.raceTime=raceElapsed; raceFinished=true;
      stopBGMusic();
      document.getElementById('scr-result').style.display='flex';
      const rt=document.getElementById('result-title');
      rt.textContent='CRASHED!'; rt.style.color='#E63946';
      rt.className='shake'; setTimeout(()=>{rt.className='';},600);
      let goRank=1; for(const n of npcs) if(n.t>player.t) goRank++;
      stats.distanceTraveled=player.t;
      document.getElementById('result-msg').textContent='Position: #'+goRank+' of 100';
      buildResultStats();
      playCrashSound(0);
      setTimeout(()=>{document.getElementById('result-buttons').style.opacity='1';},600);
      break;
    }
    case 'victory': {
      stats.raceTime=raceElapsed; raceFinished=true;
      stopBGMusic();
      document.getElementById('scr-result').style.display='flex';
      let vRank=1; for(const n of npcs) if((n.finished||n.t>player.t)&&!n.crashed) vRank++;
      stats.distanceTraveled=player.t;
      const rt=document.getElementById('result-title');
      const rm=document.getElementById('result-msg');
      if(vRank===1){
        rt.textContent='\u{1F3C6} 1st PLACE!'; rt.style.color='#FFD700';
        rt.className='pulse';
        rm.textContent='CONGRATULATIONS! You destroyed them all!';
        spawnConfetti(); playFinishFanfare();
      } else if(vRank<=3){
        rt.textContent='\u{1F3C5} #'+vRank+' FINISH!'; rt.style.color='#FFD700';
        rt.className='pulse';
        rm.textContent='CONGRATULATIONS! Amazing podium finish!';
        spawnConfetti(); playFinishFanfare();
      } else if(vRank<=10){
        rt.textContent='#'+vRank+' FINISH!'; rt.style.color='#2A9D8F';
        rt.className='pulse';
        rm.textContent='Congratulations! Top 10 finish!';
        spawnConfetti(); playFinishFanfare();
      } else {
        rt.textContent='#'+vRank+' FINISH!'; rt.style.color='#2A9D8F'; rt.className='';
        rm.textContent='Congratulations! You finished the race!';
        playFinishFanfare();
      }
      buildResultStats();
      setTimeout(()=>{document.getElementById('result-buttons').style.opacity='1';},600);
      break;
    }
  }
  }catch(e){showErr(e);}
}

  document.getElementById('confetti-container').innerHTML='';
  document.getElementById('result-title').className='';
  setState('title');
};

// Pause buttons
document.getElementById('btn-resume').onclick=()=>{
  paused=false;
  document.getElementById('hud-pause').style.display='none';
  document.getElementById('pause-menu').style.display='none';
};
document.getElementById('btn-quit').onclick=()=>{
  paused=false;
  document.getElementById('pause-menu').style.display='none';
  stopBGMusic();
  setState('title');
};

// ============================================================
// RESIZE
// ============================================================
function onResize() {
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w, h);
  custCamera.aspect=w/h; custCamera.updateProjectionMatrix();
  raceCamera.aspect=w/h; raceCamera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time-lastTime)/1000, 0.05);
  lastTime = time;
  try{
  switch(gameState){
    case 'title':
      renderer.render(custScene, custCamera);
      break;

    case 'customize':
      updateCustomizeCamera(dt);
      renderer.render(custScene, custCamera);
      break;

    case 'race':
      if(!paused){
        const inCountdown=updateCountdown(dt);

        if(!playerCrashed&&!inCountdown){
          updatePlayer(dt);
          updateKick(dt);
          checkCollisions();
          updateChaseCamera(dt);
          animatePlayerPedaling();
          updateWindNoise(player.speed);
          if(Math.random()<player.speed*0.0008) playPedalClick();
          if(player.speed>18&&!player.jumping) emitDust(player.worldX,player.worldY,player.worldZ,player.heading,player.speed);
        } else if(playerCrashed){
          crashTimer+=dt;
          updateCrashCamera(dt);
          if(crashTimer>=2.5) setState('gameover');
        } else {
          // During countdown: position and face forward (same as updatePlayer logic)
          const csp=getSpinePos(player.t, player.lateral);
          player.worldX=csp.x; player.worldY=csp.y; player.worldZ=csp.z;
          player.heading=csp.heading;
          if(player.group){
            player.group.position.set(csp.x, csp.y+0.225, csp.z);
            // Use quaternion to avoid Euler angle issues
            const q = new THREE.Quaternion();
            q.setFromAxisAngle(new THREE.Vector3(0,1,0), csp.heading - Math.PI/2);
            player.group.quaternion.copy(q);
          }
          animatePlayerPedaling();
          updateChaseCamera(dt);
        }
        if(!inCountdown&&!raceFinished){
          updateNPCs(dt);
          checkNPCCollisions(dt);
        }
        updateRagdolls(dt);
        updateCrashedObstacles(dt);
        updateCrashParticles(dt);
        updateSkidMarks(dt);
        updateDustParticles(dt);
        hudCounter++;
        if(hudCounter%4===0) updateHUD();
      }
      renderer.render(raceScene, raceCamera);
      break;

    case 'gameover':
    case 'victory': {
      const sp=getSpinePos(player.t, player.lateral);
      const rt = time*0.0003;
      raceCamera.position.set(sp.x+Math.sin(rt)*8, sp.y+4, sp.z+Math.cos(rt)*8);
      raceCamera.lookAt(sp.x, sp.y+1, sp.z);
      renderer.render(raceScene, raceCamera);
      break;
    }
  }
  }catch(e){showErr(e);}
}

// ============================================================
// INIT
// ============================================================
function showErr(e){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;width:100%;z-index:99;background:red;color:#fff;padding:16px;font-size:14px;white-space:pre-wrap;word-break:break-all;';
  d.textContent='ERROR: '+e.message+'\n'+e.stack;
  document.body.appendChild(d);
  console.error(e);
}
try{
  setupCustomizeScene();
  buildCustomizeUI();
  onResize();
  setState('title');
}catch(e){showErr(e);}
requestAnimationFrame(animate);
</script>
